name: Build and Push Novu Components Images to ECR

on:
  push:
    branches:
      - feat/terraform

jobs:
  build_and_push:
    name: Build, Tag, and Push Docker Image to Artifact Registry
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: GCP authentication for github actions
        id: gcp-auth
        uses: 'google-github-actions/auth@v2'
        with:
            token_format: 'access_token'
            workload_identity_provider: ${{ secrets.GCP_AUTH_WORKLOAD_IDP }}
            service_account: ${{ secrets.GCP_AUTH_SA }}


      - name: Docker registry authentication
        id: docker-registry-auth
        uses: docker/login-action@v3
        with:
            registry: europe-west1-docker.pkg.dev
            username: oauth2accesstoken
            password: ${{ steps.gcp-auth.outputs.access_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
    
      - name: Build and push Web
        uses: docker/build-push-action@v6
        with:
            file: ./apps/web/Dockerfile
            push: true
            tags: europe-west1-docker.pkg.dev/jack-lucius-tech/lucius/novu-web:latest
